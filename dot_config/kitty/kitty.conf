# matches the retired foot.ini: same font, DMS matugen theming hook
font_family      Maple Mono NF
font_size        14

# DMS auto-theming (DMS writes these via matugen when kitty is present);
# globinclude tolerates the files not existing yet on first login
globinclude dank-theme.conf
globinclude dank-tabs.conf

# Ghostty-parity clipboard behaviour (the reason kitty was chosen):
# Ctrl+C copies if a selection exists, otherwise sends the interrupt
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard
